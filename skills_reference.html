<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>[ SKILL CATALOG ] /// REV 4.1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-tactical:#0A0A0A;
    --bg-surface:#0F0F0F;
    --text-phosphor:#EAEAEA;
    --text-secondary:#999;
    --text-muted:#555;
    --accent-dawn:#5B9BD5;
    --accent-glow:rgba(91,155,213,0.15);
    --border-solid:#EAEAEA;
    --border-subtle:rgba(234,234,234,0.10);
    --pastel-tag:#1A1A1A;
    --glass-blur:20px;
    --cubic-editorial:cubic-bezier(0.32,0.72,0,1);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{font-size:16px;scroll-behavior:smooth;background:var(--bg-tactical)}
  body{
    background:var(--bg-tactical);color:var(--text-phosphor);
    font-family:'JetBrains Mono',monospace;line-height:1.6;
    overflow-x:hidden;-webkit-font-smoothing:antialiased;min-height:100vh;
  }

  /* ═══ SCANLINES ═══ */
  #scanlines{
    position:fixed;inset:0;z-index:9998;pointer-events:none;
    background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px);
    opacity:0.6;
  }
  /* ═══ GRID OVERLAY ═══ */
  #grid-overlay{
    position:fixed;inset:0;z-index:1;pointer-events:none;
    background-image:
      linear-gradient(rgba(234,234,234,0.03) 1px,transparent 1px),
      linear-gradient(90deg,rgba(234,234,234,0.03) 1px,transparent 1px);
    background-size:80px 80px;
  }

  /* ═══ CANVAS ═══ */
  #particles{position:fixed;inset:0;z-index:0;pointer-events:none;width:100%;height:100%}

  /* ═══ HERO ═══ */
  .hero{
    position:relative;z-index:10;max-width:1800px;margin:0 auto;
    padding:140px 48px 80px;
  }
  .hero-tag{
    display:block;font-size:0.75rem;font-weight:700;color:var(--accent-dawn);
    letter-spacing:0.18em;text-transform:uppercase;margin-bottom:28px;
    font-family:'JetBrains Mono',monospace;
  }
  .hero h1{
    font-family:'Geist',sans-serif;
    font-size:clamp(2.6rem,4.5vw,5.5rem);
    font-weight:800;line-height:0.95;letter-spacing:-0.05em;
    color:var(--text-phosphor);max-width:1100px;
  }
  .hero h1 .strike .char{color:var(--accent-dawn)}
  /* Sequential char reveal */
  .hero h1 .char{
    display:inline-block;opacity:0;
    animation:charIn 0.5s var(--cubic-editorial) forwards;
    animation-delay:calc(var(--c)*40ms + 400ms);
  }
  @keyframes charIn{
    0%{opacity:0;transform:translateY(30px);filter:blur(8px)}
    100%{opacity:1;transform:translateY(0);filter:blur(0)}
  }
  .hero .inline-block{
    display:inline-block;vertical-align:middle;
    width:clamp(40px,5vw,72px);height:clamp(24px,2.5vw,36px);
    background:var(--accent-dawn);margin:0 8px;
    box-shadow:0 0 40px var(--accent-glow);
  }
  .hero .sub{
    display:block;font-family:'JetBrains Mono',monospace;font-size:0.7rem;
    color:var(--text-muted);margin-top:32px;text-transform:uppercase;
    letter-spacing:0.12em;max-width:560px;line-height:1.8;
  }
  .hero .sub strong{color:var(--text-phosphor);font-weight:500}

  /* ═══ FLOATING GLASS PILL ═══ */
  .controls-wrap{
    position:sticky;top:24px;z-index:30;display:flex;justify-content:center;
    padding:0 20px;margin-bottom:80px;
  }
  .controls{
    background:rgba(10,10,10,0.75);backdrop-filter:blur(var(--glass-blur));
    -webkit-backdrop-filter:blur(var(--glass-blur));
    border:1px solid var(--border-subtle);border-radius:9999px;
    padding:6px 8px;display:flex;gap:4px;flex-wrap:wrap;align-items:center;
  }
  .controls input{
    background:transparent;border:none;padding:10px 18px;min-width:200px;max-width:320px;
    color:var(--text-phosphor);font-family:'JetBrains Mono',monospace;font-size:0.7rem;outline:none;
  }
  .controls input::placeholder{color:var(--text-muted)}
  .chip{
    font-family:'JetBrains Mono',monospace;font-size:0.62rem;padding:7px 16px;
    border-radius:9999px;cursor:pointer;background:transparent;border:1px solid transparent;
    color:var(--text-muted);transition:all 0.4s var(--cubic-editorial);
    text-transform:uppercase;letter-spacing:0.05em;font-weight:500;
  }
  .chip:hover{color:var(--text-phosphor);background:rgba(255,255,255,0.04);transform:scale(1.04)}
  .chip.on{color:var(--bg-tactical);background:var(--text-phosphor);font-weight:700}
  .cnt{
    font-size:0.58rem;color:var(--text-muted);margin-right:8px;white-space:nowrap;
    font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:0.06em;
  }

  /* ═══ CONTAINER ═══ */
  .container{max-width:1800px;margin:0 auto;padding:0 48px 120px;position:relative;z-index:2}

  /* ═══ STATS BAR ═══ */
  .stats-bar{
    display:flex;gap:48px;flex-wrap:wrap;margin-bottom:48px;padding-bottom:24px;
    border-bottom:1px solid var(--border-subtle);
  }
  .stats-bar span{
    font-family:'Geist',sans-serif;font-size:clamp(1.2rem,1rem+1.5vw,1.8rem);
    font-weight:700;color:var(--text-phosphor);
  }
  .stats-bar span em{
    font-family:'JetBrains Mono',monospace;font-size:0.58rem;font-weight:400;
    color:var(--text-muted);font-style:normal;display:block;
    text-transform:uppercase;letter-spacing:0.08em;
  }

  /* ═══ GRID ═══ */
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(400px,1fr));
    gap:1px;
    background:var(--border-solid);
    border:1px solid var(--border-solid);
  }

  /* ═══ DOUBLE-BEZEL CARDS + 3D MOUSE TILT ═══ */
  .card{
    background:var(--bg-tactical);
    padding:6px;
    opacity:0;transform:translateY(48px);filter:blur(4px);
    transition:opacity 0.7s var(--cubic-editorial),transform 0.7s var(--cubic-editorial),filter 0.7s var(--cubic-editorial);
    perspective:1200px;
  }
  .card.revealed{opacity:1;transform:translateY(0);filter:blur(0);will-change:transform,opacity,filter}
  .card-inner{
    border:1px solid var(--border-solid);
    padding:28px 28px 24px;height:100%;
    display:flex;flex-direction:column;gap:14px;
    position:relative;border-radius:0;
    background:var(--bg-tactical);
    transition:background 0.4s var(--cubic-editorial),box-shadow 0.4s var(--cubic-editorial);
    transform:rotateX(var(--tX,0deg)) rotateY(var(--tY,0deg));
    transform-style:preserve-3d;
    will-change:transform;
  }
  .card-inner:hover{
    background:var(--bg-surface);
    box-shadow:0 0 60px var(--accent-glow),0 20px 40px rgba(0,0,0,0.6);
  }

  /* Pre-loaded */
  .card.preloaded .card-inner{border-color:var(--accent-dawn)}
  .card .pre-badge{
    position:absolute;top:12px;right:14px;
    font-family:'JetBrains Mono',monospace;font-size:0.5rem;font-weight:700;
    letter-spacing:0.12em;color:var(--accent-dawn);text-transform:uppercase;
  }
  .card .name{
    font-family:'Geist',sans-serif;font-size:1.2rem;font-weight:700;
    color:var(--text-phosphor);line-height:1.15;letter-spacing:-0.02em;
    padding-right:50px;
  }
  .card.preloaded .name{color:var(--accent-dawn)}
  .card .cat{
    font-family:'JetBrains Mono',monospace;font-size:0.55rem;text-transform:uppercase;
    letter-spacing:0.1em;color:var(--text-muted);
    border:1px solid var(--border-subtle);padding:3px 9px;align-self:flex-start;
  }
  .card .desc{font-size:0.72rem;color:var(--text-secondary);line-height:1.7}

  .card .gh{
    border-left:2px solid var(--accent-dawn);padding:8px 12px;
    display:flex;flex-direction:column;gap:3px;
  }
  .card .gh .gh-label{
    font-family:'JetBrains Mono',monospace;font-size:0.5rem;text-transform:uppercase;
    letter-spacing:0.08em;color:var(--text-muted);
  }
  .card .gh a,.card .gh span.gh-builtin{
    font-size:0.62rem;color:var(--text-phosphor);text-decoration:none;word-break:break-all;
    font-family:'JetBrains Mono',monospace;transition:color 0.2s;
  }
  .card .gh a:hover{color:var(--accent-dawn)}

  .card .cmd-block{
    position:relative;cursor:pointer;transition:color 0.3s var(--cubic-editorial);
    border-top:1px solid var(--border-subtle);border-bottom:1px solid var(--border-subtle);
    padding:10px 0;margin-top:4px;
  }
  .card .cmd-block:hover{color:var(--accent-dawn)}
  .card .cmd-block .cmd-prefix{color:var(--accent-dawn);margin-right:10px;font-weight:700}
  .card .cmd-block .cmd-text{
    font-size:0.65rem;color:var(--text-phosphor);word-break:break-all;
    font-family:'JetBrains Mono',monospace;
  }
  .card .cmd-block .cmd-label{
    font-family:'JetBrains Mono',monospace;font-size:0.48rem;text-transform:uppercase;
    letter-spacing:0.1em;color:var(--text-muted);position:absolute;top:6px;right:0;
  }
  .card .cmd-block .cmd-label.copied{color:var(--accent-dawn)}

  .card .prompt-block{
    padding:10px 0;margin-top:2px;position:relative;cursor:pointer;
    transition:color 0.3s var(--cubic-editorial);
  }
  .card .prompt-block:hover{color:var(--accent-dawn)}
  .card .prompt-block .pr-prefix{color:var(--text-muted);margin-right:10px;font-weight:700}
  .card .prompt-block .pr-text{
    font-size:0.62rem;color:var(--text-secondary);word-break:break-all;
    font-family:'JetBrains Mono',monospace;font-style:italic;
  }
  .card .prompt-block .pr-label{
    font-family:'JetBrains Mono',monospace;font-size:0.48rem;text-transform:uppercase;
    letter-spacing:0.1em;color:var(--text-muted);position:absolute;top:6px;right:0;
  }
  .card .prompt-block .pr-label.copied{color:var(--accent-dawn)}

  .card .tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
  .card .tags span{
    font-family:'JetBrains Mono',monospace;font-size:0.55rem;padding:2px 9px;
    color:var(--text-muted);background:var(--pastel-tag);
    border:1px solid var(--border-subtle);text-transform:uppercase;letter-spacing:0.05em;
  }

  .empty{
    grid-column:1/-1;text-align:center;padding:100px 20px;color:var(--text-muted);
    font-size:0.72rem;text-transform:uppercase;letter-spacing:0.08em;
    border:1px solid var(--border-solid);background:var(--bg-tactical);
    font-family:'JetBrains Mono',monospace;
  }

  ::-webkit-scrollbar{width:5px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:rgba(234,234,234,0.05);border-radius:0}
  ::-webkit-scrollbar-thumb:hover{background:rgba(234,234,234,0.10)}

  @media(max-width:800px){
    .hero{padding:100px 20px 48px}
    .hero h1{font-size:2rem}
    .container{padding:0 20px 80px}
    .grid{grid-template-columns:1fr}
    .stats-bar{gap:24px}
    .controls input{max-width:180px;min-width:120px}
  }
</style>
</head>

let filter='all',renderTimer;
const io=new IntersectionObserver((entries)=>{
  entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('revealed');io.unobserve(e.target)}});
},{threshold:0.06});

function debounceRender(){clearTimeout(renderTimer);renderTimer=setTimeout(render,150)}

function render(){
  const q=document.getElementById('search').value.toLowerCase();
  let f=S;
  if(filter==='pre')f=f.filter(s=>s.p);
  else if(filter!=='all')f=f.filter(s=>s.c===filter);
  if(q)f=f.filter(s=>s.n.includes(q)||s.d.toLowerCase().includes(q)||s.t.some(t=>t.includes(q))||s.g.includes(q));

  document.getElementById('cnt').textContent=f.length+' / '+S.length+' SKILLS';
  io.disconnect();
  const grid=document.getElementById('grid');
  if(!f.length){grid.innerHTML='<div class="empty">/// NO TACTICAL MATCHES FOR \"'+h(q)+'\"</div>';updStats(f);return}

  const cats={d:'DESIGN',s:'SYSTEM',u:'UTILITY',v:'DEV',c:'COMM'};
  grid.innerHTML=f.map((s,i)=>{
    const hasGh=!!s.g;
    return `
    <div class="card${s.p?' preloaded':''}" style="transition-delay:${i*35}ms">
      <div class="card-inner">
        ${s.p?'<span class="pre-badge">PRE-LOADED</span>':''}
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px">
          <span class="name">${h(s.n)}</span>
          <span class="cat">${cats[s.c]||'CORE'}</span>
        </div>
        <div class="desc">${h(s.d)}</div>
        <div class="gh">
          <span class="gh-label">Install this GitHub skill into my project:</span>
          ${hasGh?'<a href="'+s.g+'" target="_blank" rel="noopener">'+h(s.g)+'</a>':'<span class="gh-builtin">Built into Codebuff — no GitHub repo needed</span>'}
        </div>
        <div class="cmd-block" onclick="cpCmd(this,'${h(s.cmd).replace(/'/g,"\\'")}')">
          <span class="cmd-prefix">❯</span><span class="cmd-text">${h(s.cmd)}</span>
          <span class="cmd-label">COPY</span>
        </div>
        <div class="prompt-block" onclick="cpPr(this,'${h(s.pr).replace(/'/g,"\\'")}')">
          <span class="pr-prefix">❯</span><span class="pr-text">${h(s.pr)}</span>
          <span class="pr-label">COPY</span>
        </div>
        <div class="tags">${s.t.map(t=>'<span>'+h(t)+'</span>').join('')}</div>
      </div>
    </div>`;
  }).join('');

  document.querySelectorAll('.card').forEach(c=>{c.classList.remove('revealed');io.observe(c)});
  bindTilt();
  updStats(f);
}

function updStats(f){
  document.getElementById('stats').innerHTML=`
    <span>${f.length}<em>Total</em></span>
    <span>${f.filter(s=>s.p).length}<em>Pre-Loaded</em></span>
    <span>${f.filter(s=>s.c==='d').length}<em>Design</em></span>
    <span>${f.filter(s=>s.c==='s').length}<em>System</em></span>
    <span>${f.filter(s=>s.c==='u').length}<em>Utility</em></span>
    <span>${f.filter(s=>s.c==='v').length}<em>Dev</em></span>
    <span>${f.filter(s=>s.c==='c').length}<em>Comm</em></span>
  `;
}

function setF(f,el){filter=f;document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));el.classList.add('on');render();}

function cpCmd(el,text){cp(el,text,'.cmd-label')}
function cpPr(el,text){cp(el,text,'.pr-label')}
function cp(el,text,labelClass){
  navigator.clipboard.writeText(text).then(()=>{
    const lbl=el.querySelector(labelClass),orig=lbl.textContent;
    lbl.textContent='COPIED';lbl.classList.add('copied');el.style.color='var(--accent-dawn)';
    setTimeout(()=>{lbl.textContent=orig;lbl.classList.remove('copied');el.style.color=''},1500);
  }).catch(()=>{});
}

function h(s){const d=document.createElement('span');d.textContent=s;return d.innerHTML;}

// ═══ 3D CARD TILT ═══
const tiltRects=new WeakMap();
function tiltEnter(e){
  const card=e.currentTarget;
  tiltRects.set(card,card.getBoundingClientRect());
  card.style.transition='none';
}
function tiltMove(e){
  const card=e.currentTarget;
  const rect=tiltRects.get(card)||card.getBoundingClientRect();
  const x=(e.clientX-rect.left)/rect.width-.5;
  const y=(e.clientY-rect.top)/rect.height-.5;
  card.style.setProperty('--tX',(-y*12)+'deg');
  card.style.setProperty('--tY',(x*12)+'deg');
}
function tiltLeave(e){
  const card=e.currentTarget;
  card.style.transition='transform 0.5s var(--cubic-editorial)';
  card.style.setProperty('--tX','0deg');
  card.style.setProperty('--tY','0deg');
  tiltRects.delete(card);
}
function bindTilt(){
  document.querySelectorAll('.card-inner').forEach(ci=>{
    ci.addEventListener('mouseenter',tiltEnter);
    ci.addEventListener('mousemove',tiltMove);
    ci.addEventListener('mouseleave',tiltLeave);
  });
}
window.addEventListener('resize',()=>{
  document.querySelectorAll('.card-inner').forEach(c=>tiltRects.set(c,c.getBoundingClientRect()));
});

// ═══ MOUSE PARALLAX ON HERO ═══
const h1=document.getElementById('hero-h1'),htag=document.querySelector('.hero-tag'),
      ibl=document.querySelector('.hero .inline-block');
let pX=0,pY=0,tX=0,tY=0;
document.addEventListener('mousemove',e=>{pX=(e.clientX/window.innerWidth-.5)*2;pY=(e.clientY/window.innerHeight-.5)*2});
function parallaxLoop(){
  tX+=(pX-tX)*0.05;tY+=(pY-tY)*0.05;
  if(h1)h1.style.transform=`translate3d(${tX*12}px,${tY*8}px,0)`;
  if(htag)htag.style.transform=`translate3d(${tX*4}px,${tY*3}px,0)`;
  if(ibl)ibl.style.transform=`translate3d(${tX*18}px,${tY*10}px,0)`;
  requestAnimationFrame(parallaxLoop);
}
requestAnimationFrame(parallaxLoop);

// ═══ CANVAS PARTICLE NETWORK ═══
const pCvs=document.getElementById('particles'),pCtx=pCvs.getContext('2d');
let pW,pH,nodes=[],scrollPaused=false,scrollTO;
function resizeParticles(){
  pW=pCvs.width=window.innerWidth;pH=pCvs.height=window.innerHeight;
  nodes=Array.from({length:50},()=>({x:Math.random()*pW,y:Math.random()*pH,
    vx:(Math.random()-.5)*0.4,vy:(Math.random()-.5)*0.4,r:Math.random()*1.5+.3,a:Math.random()*.2+.04}));
}
resizeParticles();window.addEventListener('resize',resizeParticles);
window.addEventListener('scroll',()=>{scrollPaused=true;clearTimeout(scrollTO);scrollTO=setTimeout(()=>scrollPaused=false,160)},{passive:true});
let mxP=-500,myP=-500;document.addEventListener('mousemove',e=>{mxP=e.clientX;myP=e.clientY});
function drawParticles(){
  if(scrollPaused){requestAnimationFrame(drawParticles);return}
  pCtx.clearRect(0,0,pW,pH);
  for(const n of nodes){
    n.x+=n.vx;n.y+=n.vy;
    if(n.x<0)n.x=pW;if(n.x>pW)n.x=0;
    if(n.y<0)n.y=pH;if(n.y>pH)n.y=0;
    pCtx.beginPath();pCtx.arc(n.x,n.y,n.r,0,Math.PI*2);
    pCtx.fillStyle='rgba(91,155,213,'+n.a+')';pCtx.fill();
  }
  // Proximity lines
  for(let i=0;i<nodes.length;i++){
    const a=nodes[i];
    // Mouse proximity
    const dm=Math.hypot(a.x-mxP,a.y-myP);
    if(dm<100){
      pCtx.beginPath();pCtx.moveTo(a.x,a.y);pCtx.lineTo(mxP,myP);
      pCtx.strokeStyle='rgba(91,155,213,'+(.06*(1-dm/100))+')';
      pCtx.lineWidth=.4;pCtx.stroke();
    }
    for(let j=i+1;j<nodes.length;j++){
      const b=nodes[j],d=Math.hypot(a.x-b.x,a.y-b.y);
      if(d<90){
        pCtx.beginPath();pCtx.moveTo(a.x,a.y);pCtx.lineTo(b.x,b.y);
        pCtx.strokeStyle='rgba(91,155,213,'+(.03*(1-d/90))+')';
        pCtx.lineWidth=.3;pCtx.stroke();
      }
    }
  }
  requestAnimationFrame(drawParticles);
}
requestAnimationFrame(drawParticles);

render();
bindTilt();
</script>
</body>
